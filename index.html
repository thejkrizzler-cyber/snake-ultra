<!DOCTYPE html>
<html>
<head>
<title>Snake Ultra</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
margin:0;
}

#menu{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#222;
padding:30px;
border-radius:10px;
}

button{
padding:10px 18px;
margin:6px;
font-size:16px;
cursor:pointer;
}

canvas{
background:black;
border:3px solid #555;
display:none;
margin:auto;
margin-top:40px;
}

</style>

</head>

<body>

<h1>🐍 Snake Ultra</h1>

<div id="menu">

<h2>Main Menu</h2>

<button onclick="startGame('classic')">Classic</button>
<button onclick="startGame('ai')">AI Mode</button>
<button onclick="startGame('multiplayer')">2 Player</button>

<br><br>

<button onclick="toggleTheme()">Change Theme</button>

<p id="highScore"></p>

</div>

<canvas id="game" width="500" height="500"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

const grid=20
const cols=canvas.width/grid
const rows=canvas.height/grid

let snake
let snake2
let aiSnake

let dir={x:1,y:0}
let dir2={x:-1,y:0}

let apples=[]
let appleCount=1

let score=0
let high=localStorage.getItem("snakeHigh")||0

let mode="classic"
let paused=false
let theme=0

document.getElementById("highScore").innerText="High Score: "+high

function rand(){

return{
x:Math.floor(Math.random()*cols),
y:Math.floor(Math.random()*rows)
}

}

function spawnApples(){

apples=[]

for(let i=0;i<appleCount;i++){

apples.push(rand())

}

}

function startGame(m){

mode=m

document.getElementById("menu").style.display="none"
canvas.style.display="block"

reset()

}

function reset(){

snake=[{x:10,y:10}]
snake2=[{x:15,y:15}]
aiSnake=[{x:5,y:5}]

dir={x:1,y:0}
dir2={x:-1,y:0}

score=0

spawnApples()

}

function moveSnake(snake,dir){

let head={
x:snake[0].x+dir.x,
y:snake[0].y+dir.y
}

if(head.x<0||head.y<0||head.x>=cols||head.y>=rows){

gameOver()
return

}

snake.unshift(head)

let ate=false

for(let i=0;i<apples.length;i++){

if(head.x===apples[i].x&&head.y===apples[i].y){

score++

apples[i]=rand()

ate=true

}

}

if(!ate) snake.pop()

}

function moveAI(){

if(mode!=="ai") return

let target=apples[0]

let head=aiSnake[0]

let dx=Math.sign(target.x-head.x)
let dy=Math.sign(target.y-head.y)

aiSnake.unshift({
x:(head.x+dx+cols)%cols,
y:(head.y+dy+rows)%rows
})

aiSnake.pop()

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

if(theme===1) canvas.style.background="#000"
if(theme===2) canvas.style.background="#222"

ctx.fillStyle="red"

apples.forEach(a=>{

ctx.fillRect(a.x*grid,a.y*grid,grid,grid)

})

snake.forEach((s,i)=>{

ctx.fillStyle=i==0?"lime":"green"

ctx.fillRect(s.x*grid,s.y*grid,grid,grid)

})

if(mode==="multiplayer"){

snake2.forEach((s,i)=>{

ctx.fillStyle=i==0?"orange":"yellow"

ctx.fillRect(s.x*grid,s.y*grid,grid,grid)

})

}

if(mode==="ai"){

ctx.fillStyle="blue"

aiSnake.forEach(s=>{

ctx.fillRect(s.x*grid,s.y*grid,grid,grid)

})

}

ctx.fillStyle="white"

ctx.fillText("Score: "+score,10,20)

}

function game(){

if(paused) return

moveSnake(snake,dir)

if(mode==="multiplayer") moveSnake(snake2,dir2)

moveAI()

draw()

}

function gameOver(){

alert("Game Over! Score: "+score)

if(score>high){

high=score
localStorage.setItem("snakeHigh",high)

}

location.reload()

}

function toggleTheme(){

theme++

if(theme>2) theme=0

}

setInterval(game,100)

document.addEventListener("keydown",e=>{

let k=e.key.toLowerCase()

if(k==="w") dir={x:0,y:-1}
if(k==="s") dir={x:0,y:1}
if(k==="a") dir={x:-1,y:0}
if(k==="d") dir={x:1,y:0}

if(e.key==="ArrowUp") dir2={x:0,y:-1}
if(e.key==="ArrowDown") dir2={x:0,y:1}
if(e.key==="ArrowLeft") dir2={x:-1,y:0}
if(e.key==="ArrowRight") dir2={x:1,y:0}

if(k==="p") paused=!paused

})

</script>

</body>
</html>
