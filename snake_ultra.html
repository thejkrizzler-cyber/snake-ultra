<!DOCTYPE html>
<html>
<head>
<title>Snake Ultra</title>
<style>
body{
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
}

canvas{
background:black;
border:3px solid #555;
margin-top:20px;
}

button{
margin:5px;
padding:8px 14px;
font-size:14px;
}
</style>
</head>
<body>

<h1>🐍 Snake Ultra</h1>

<div>
<button onclick="setMode('classic')">Classic</button>
<button onclick="setMode('ai')">AI Mode</button>
<button onclick="setMode('multiplayer')">2 Player</button>
<button onclick="toggleGod()">God Mode</button>
<button onclick="toggleMap()">Procedural Map</button>
<button onclick="restart()">Restart</button>
</div>

<div>
<button onclick="setTheme('classic')">Classic Theme</button>
<button onclick="setTheme('neon')">Neon Theme</button>
<button onclick="setTheme('dark')">Dark Theme</button>
</div>

<p>
Controls:<br>
Player1 = WASD<br>
Player2 = Arrow Keys<br>
P = Pause
</p>

<p id="score"></p>
<p id="high"></p>

<canvas id="game" width="500" height="500"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const grid = 20;
const cols = canvas.width/grid;
const rows = canvas.height/grid;

let snake;
let snake2;
let aiSnake;

let dir={x:1,y:0};
let dir2={x:-1,y:0};

let apples=[];
let powerups=[];
let appleCount=1;

let mode="classic";
let god=false;
let paused=false;
let procedural=false;

let walls=[];
let theme="classic";

let score=0;
let high=localStorage.getItem("snakeHigh")||0;

document.getElementById("high").innerText="High Score: "+high;

function rand(){
return {
x:Math.floor(Math.random()*cols),
y:Math.floor(Math.random()*rows)
}
}

function spawnApples(){
apples=[];
for(let i=0;i<appleCount;i++){
apples.push(rand());
}
}

function spawnPower(){
if(Math.random()<0.2){
powerups.push({
...rand(),
type:["speed","shield","mega"][Math.floor(Math.random()*3)]
});
}
}

function generateWalls(){
walls=[];
if(!procedural) return;

for(let i=0;i<30;i++){
walls.push(rand());
}
}

function start(){

snake=[{x:10,y:10}];
snake2=[{x:15,y:15}];
aiSnake=[{x:5,y:5}];

dir={x:1,y:0};
dir2={x:-1,y:0};

score=0;

spawnApples();
generateWalls();

}

function setMode(m){
mode=m;
restart();
}

function toggleGod(){
god=!god;
}

function toggleMap(){
procedural=!procedural;
generateWalls();
}

function restart(){
start();
}

function setTheme(t){
theme=t;
}

function moveSnake(snake,dir){

let head={
x:snake[0].x+dir.x,
y:snake[0].y+dir.y
};

if(head.x<0||head.y<0||head.x>=cols||head.y>=rows){

if(god){
head.x=(head.x+cols)%cols;
head.y=(head.y+rows)%rows;
}
else{
return false;
}

}

snake.unshift(head);

let ate=false;

for(let i=0;i<apples.length;i++){

if(head.x===apples[i].x&&head.y===apples[i].y){

score++;

apples[i]=rand();

spawnPower();

ate=true;

}

}

for(let i=0;i<powerups.length;i++){

let p=powerups[i];

if(head.x===p.x&&head.y===p.y){

if(p.type==="mega"){

for(let j=0;j<5;j++){
snake.push({...snake[snake.length-1]});
}

}

if(p.type==="speed"){
speed=50;
setTimeout(()=>speed=100,4000);
}

powerups.splice(i,1);

}

}

if(!ate) snake.pop();

return true;

}

function moveAI(){

if(mode!=="ai") return;

let target=apples[0];
let head=aiSnake[0];

let dx=Math.sign(target.x-head.x);
let dy=Math.sign(target.y-head.y);

let newHead={
x:(head.x+dx+cols)%cols,
y:(head.y+dy+rows)%rows
};

aiSnake.unshift(newHead);
aiSnake.pop();

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(theme==="neon"){
canvas.style.background="black";
}

if(theme==="dark"){
canvas.style.background="#222";
}

ctx.fillStyle="gray";
walls.forEach(w=>{
ctx.fillRect(w.x*grid,w.y*grid,grid,grid);
});

ctx.fillStyle="red";
apples.forEach(a=>{
ctx.fillRect(a.x*grid,a.y*grid,grid,grid);
});

powerups.forEach(p=>{
if(p.type==="speed") ctx.fillStyle="yellow";
if(p.type==="shield") ctx.fillStyle="cyan";
if(p.type==="mega") ctx.fillStyle="purple";

ctx.fillRect(p.x*grid,p.y*grid,grid,grid);
});

snake.forEach((s,i)=>{
ctx.fillStyle=i==0?"lime":"green";
ctx.fillRect(s.x*grid,s.y*grid,grid,grid);
});

if(mode==="multiplayer"){

snake2.forEach((s,i)=>{
ctx.fillStyle=i==0?"orange":"gold";
ctx.fillRect(s.x*grid,s.y*grid,grid,grid);
});

}

if(mode==="ai"){

ctx.fillStyle="blue";

aiSnake.forEach(s=>{
ctx.fillRect(s.x*grid,s.y*grid,grid,grid);
});

}

document.getElementById("score").innerText="Score: "+score;

if(score>high){
high=score;
localStorage.setItem("snakeHigh",high);
document.getElementById("high").innerText="High Score: "+high;
}

}

let speed=100;

function game(){

if(paused) return;

if(!moveSnake(snake,dir)){
restart();
}

if(mode==="multiplayer"){
moveSnake(snake2,dir2);
}

moveAI();

draw();

}

setInterval(game,100);

document.addEventListener("keydown",e=>{

let k=e.key.toLowerCase();

if(k==="w") dir={x:0,y:-1};
if(k==="s") dir={x:0,y:1};
if(k==="a") dir={x:-1,y:0};
if(k==="d") dir={x:1,y:0};

if(e.key==="ArrowUp") dir2={x:0,y:-1};
if(e.key==="ArrowDown") dir2={x:0,y:1};
if(e.key==="ArrowLeft") dir2={x:-1,y:0};
if(e.key==="ArrowRight") dir2={x:1,y:0};

if(k==="p") paused=!paused;

});

start();

</script>

</body>
</html>
